<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <title>backoffice</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="min-vh-100 d-flex flex-column">
    <header>
      <!-- inizio navbar -->
      <nav class="navbar navbar-expand-lg custom-card">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html"
            >Fast <span class="red_logo"> Ride </span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./backoffice.html">BackOffice</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <!-- fine navbar -->
    </header>
    <main class="flex-grow-1">
      <section class="text-center my-3 text-light">
        <h1>Fast <span class="red_logo"> Ride </span></h1>
        <h3>Ride the adventure</h3>
      </section>
      <!-- spinner -->

      <!-- fine spinner -->
      <div class="container">
        <div class="row justify-content-center my-5">
          <div class="col col-12 col-md-6 text-light">
            <!-- inizio Form -->
            <form action="" id="product_form">
              <div class="mb-3">
                <label for="name" class="form-label">Nome Prodotto</label>
                <input type="text" class="form-control" id="name" required />
              </div>
              <div class="mb-3">
                <label for="description" class="form-label"
                  >Descrrizione Prodotto</label
                >
                <textarea
                  rows="7"
                  class="form-control"
                  type="text"
                  id="description"
                  required
                ></textarea>
              </div>
              <div class="mb-3">
                <label for="brand" class="form-label">Brand</label>
                <input type="text" class="form-control" id="brand" required />
              </div>
              <div class="mb-3">
                <label for="price" class="form-label">Prezzo Prodotto</label>
                <input type="number" class="form-control" id="price" required />
              </div>
              <div class="mb-3">
                <label for="imageUrl" class="form-label">Foto Prodotto</label>
                <input
                  type="text"
                  class="form-control"
                  id="imageUrl"
                  required
                />
              </div>
              <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary custom-btn">
                  SALVA
                </button>
                <input
                  class="btn btn-primary custom-btn"
                  type="reset"
                  value="RESET"
                  onclick="return confirm('resettare il form?')"
                />
              </div>
            </form>
            <!-- fine form -->
          </div>
        </div>
      </div>
      <div class="container">
        <div class="row justify-content-center mb-3" id="details">
          <!-- card -->
        </div>
      </div>
    </main>
    <footer>
      <!-- place footer here -->
    </footer>
    <div class="text-center">
      <p>- FastRide -</p>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script/backoffice.js"></script>
  </body>
</html>
